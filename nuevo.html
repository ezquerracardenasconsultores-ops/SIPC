<main>

<section class="bienvenida">

<h2>

Registro del Expediente

</h2>

<p>

Complete la información general del expediente antes de generar el Informe Pericial.

</p>

</section>

<form class="formulario">

<div class="fila">

<div class="campo">

<label>Código del Expediente</label>

<input
type="text"
placeholder="IPC-2026-001">

</div>

<div class="campo">

<label>Fecha</label>

<input
type="date">

</div>

</div>

<div class="fila">

<div class="campo">

<label>Cliente</label>

<input
type="text">

</div>

<div class="campo">

<label>Materia</label>

<input
type="text">

</div>

</div>

<div class="fila">

<div class="campo">

<label>Demandante</label>

<input
type="text">

</div>

<div class="campo">

<label>Demandado</label>

<input
type="text">

</div>

</div>

<div class="fila">

<div class="campo">

<label>Expediente Judicial</label>

<input
type="text">

</div>

<div class="campo">

<label>Juzgado</label>

<input
type="text">

</div>

</div>

<div class="fila">

<div class="campo">

<label>Distrito Judicial</label>

<input
type="text">

</div>

<div class="campo">

<label>Estado</label>

<select>

<option>En elaboración</option>

<option>Terminado</option>

<option>Archivado</option>

</select>

</div>

</div>

<div class="campo">

<label>Observaciones</label>

<textarea rows="6"></textarea>

</div>

<br>

<button class="btn">

Guardar Expediente

</button>

<button class="btn">

Generar Informe

</button>

</form>

</main>

<footer>

</footer>
