<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nuevo Expediente | SIPC</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header>

<div class="logo">
SIPC
</div>

<div class="titulo">

<h1>Nuevo Expediente Pericial</h1>

<p>Sistema Integral de Pericias Contables</p>

</div>

</header>

<nav>

<a href="index.html">🏠 Inicio</a>

<a href="historial.html">📂 Expedientes</a>

<a href="nuevo.html">📄 Nuevo</a>

<a href="#">📚 Biblioteca</a>

</nav>

<main>

<section class="bienvenida">

<h2>Registro del Expediente</h2>

<p>

Complete la información general del expediente.

</p>

</section>

<form id="formExpediente">

<div class="fila">

<div class="campo">

<label>Código del Expediente</label>

<input
type="text"
id="codigo"
placeholder="IPC-2026-001"
required>

</div>

<div class="campo">

<label>Fecha</label>

<input
type="date"
id="fecha"
required>

</div>

</div>

<div class="fila">

<div class="campo">

<label>Cliente</label>

<input
type="text"
id="cliente"
required>

</div>

<div class="campo">

<label>Materia</label>

<input
type="text"
id="materia">

</div>

</div>

<div class="fila">

<div class="campo">

<label>Demandante</label>

<input
type="text"
id="demandante">

</div>

<div class="campo">

<label>Demandado</label>

<input
type="text"
id="demandado">

</div>

</div>

<div class="fila">

<div class="campo">

<label>Expediente Judicial</label>

<input
type="text"
id="expediente">

</div>

<div class="campo">

<label>Juzgado</label>

<input
type="text"
id="juzgado">

</div>

</div>

<div class="fila">

<div class="campo">

<label>Distrito Judicial</label>

<input
type="text"
id="distrito">

</div>

<div class="campo">

<label>Estado</label>

<select id="estado">

<option>En elaboración</option>

<option>Terminado</option>

<option>Archivado</option>

</select>

</div>

</div>

<div class="campo">

<label>Observaciones</label>

<textarea rows="6" id="obs"></textarea>

</div>

<br>

<div style="display:flex;gap:15px;flex-wrap:wrap;">

<button
type="button"
class="btn"
onclick="guardarExpediente()">

💾 Guardar Expediente

</button>

<button
type="button"
class="btn"
onclick="abrirExpediente()">

📂 Abrir Expediente

</button>

<button
type="button"
class="btn"
onclick="abrirInforme()">

📄 Informe Pericial

</button>

</div>

</form>

</main>

<footer>

Sistema Integral de Pericias Contables (SIPC)

</footer>

<script>

function guardarExpediente(){

const datos={

codigo:document.getElementById("codigo").value,

fecha:document.getElementById("fecha").value,

cliente:document.getElementById("cliente").value,

materia:document.getElementById("materia").value,

demandante:document.getElementById("demandante").value,

demandado:document.getElementById("demandado").value,

expediente:document.getElementById("expediente").value,

juzgado:document.getElementById("juzgado").value,

distrito:document.getElementById("distrito").value,

estado:document.getElementById("estado").value,

observaciones:document.getElementById("obs").value

};

localStorage.setItem("expedienteActual",JSON.stringify(datos));

alert("Expediente guardado correctamente.");

}

function abrirExpediente(){

window.location.href="caso_umeres/index.html";

}

function abrirInforme(){

window.location.href="caso_umeres/informe.html";

}

</script>

</body>

</html>
